baseURL = 'https://mirror2.jazzofjapan.com/'
locale = 'en-us'
title = 'Jazz of Japan | Brian McCrory'
theme = "PaperMod"
# disableAliases = true # not currently setting aliases (but see redirects below)

[taxonomies]
  tag = "tags" # disable categories by not including here
  
[permalinks]
  [permalinks.page]
    albums = "/archive/:slug/" # to maintain buttondown urls for now
    extra = "/archive/:slug/" # to maintain buttondown urls for now
#    clubs = "/club/:slug/"
#    guides = "/club/:slug/"
#    blog = '/blog/:year/:month/:slug/' # for the "behind the scenes" posts

# [pagination] # replaced below by params.pagination used by list.html
#   pagerSize = 30

[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true

[params]
  author = 'Brian McCrory'
  description = 'Introducing modern-day jazz of Japan through albums, musicians, and clubs'
  defaultTheme = "auto"
  disableThemeToggle = true
  mainSections = ["albums", "extra"]
#  mainSections = ["albums", "clubs", "guides"]
  showReadingTime = false
  showWordCount = false
  hideAuthor = false
  disableSpecial1stPost = true
  ShowFullTextinRSS = true
  [params.homeInfoParams]
  Title = "Welcome to Jazz of Japan"
  Content ="""
This is an experimental mirror site for <a href="https://www.jazzofjapan.com">Jazz of Japan</a>. The latest articles are shown below, and you can use the links in the menu above to dig into the archives. You can subscribe to <a href="https://buttondown.com/jazzofjapan">newsletter</a> by entering your email here:
{{< subscribe-form >}}
"""

  [params.footer]
    text = 'Since 2018 · <a href="/index.xml">RSS</a>'
  [params.cover]
    hidden = false
    hiddenInList = false
    hiddenInSingle = false
    linkFullImages = true
  [params.pagination]
    pagerSize = 30
    pagerSizeHome = 9
[related]
  includeNewer = true
  threshold = 80
  toLower = false
  [[related.indices]]
    applyFilter = false
    cardinalityThreshold = 0
    name = 'keywords'
    pattern = ''
    toLower = false
    type = 'basic'
    weight = 100
  [[related.indices]]
    applyFilter = false
    cardinalityThreshold = 0
    name = 'date'
    pattern = ''
    toLower = false
    type = 'basic'
    weight = 10
  [[related.indices]]
    applyFilter = false
    cardinalityThreshold = 0
    name = 'tags'
    pattern = ''
    toLower = false
    type = 'basic'
    weight = 80
[menu]

# [[menu.main]]
#   name = "Home"
#   url = "/"
#   weight = 1
[[menu.main]]
  name = "Albums"
  url = "/albums/"
  weight = 2
[[menu.main]]
  name = "Extra"
  url = "/extra/"
  weight = 3
# [[menu.main]]
#   name = "Guides"
#   url = "/guides/"
#   weight = 3
# [[menu.main]]
#   name = "Tags"
#   url = "/tags/"
#   weight = 4
[[menu.main]]
  name = "Archive"
  url = "/archive/"
  weight = 5
[[menu.main]]
  name = "About"
  url = "/about/"
  weight = 6
[[menu.main]]
  name = "Search"
  url = "/search/"
  weight = 7
[[menu.main]]
  name = "Subscribe"
  url = "https://www.jazzofjapan.com"
  weight = 8


# Redirect via _redirects file (server-side, http, supported by cloudflare), not hugo redirects (client-side, html)
[mediaTypes]
  [mediaTypes.'text/redirects']
    delimiter = ''

[outputFormats]
  [outputFormats.redirects]
    baseName = '_redirects'
    isPlainText = true
    mediaType = 'text/redirects'
    root = true

[outputs]
  home = ['html', 'redirects', 'rss', 'json']
