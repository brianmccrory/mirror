baseURL = 'https://mirror.jazzofjapan.com/'
locale = 'en-us'
title = 'Jazz of Japan | Brian McCrory'
theme = "PaperMod"

[outputs]
  home = ["HTML", "RSS", "JSON"]

[permalinks]
[permalinks.page]
  albums = "/:slug/"
  clubs = "/club/:slug/"
  guides = "/club/:slug/"
  # blog = '/blog/:year/:month/:slug/'
  
[pagination]
  pagerSize = 30

[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true
      
[params]
  defaultTheme = "auto"
  disableThemeToggle = true
#  mainSections = ["albums"]
  mainSections = ["albums", "clubs", "guides"]
  showReadingTime = false
  showWordCount = false
  hideAuthor = false
  disableSpecial1stPost = true
  [params.footer]
    text = 'Since 2018 · <a href="/index.xml">RSS feed</a>'
  [params.cover]
    hidden = false
    hiddenInList = false
    hiddenInSingle = false
    linkFullImages = true
[related]
  includeNewer = true
  threshold = 80
  toLower = false
  [[related.indices]]
    applyFilter = false
    cardinalityThreshold = 0
    name = 'keywords'
    pattern = ''
    toLower = false
    type = 'basic'
    weight = 100
  [[related.indices]]
    applyFilter = false
    cardinalityThreshold = 0
    name = 'date'
    pattern = ''
    toLower = false
    type = 'basic'
    weight = 10
  [[related.indices]]
    applyFilter = false
    cardinalityThreshold = 0
    name = 'tags'
    pattern = ''
    toLower = false
    type = 'basic'
    weight = 80
